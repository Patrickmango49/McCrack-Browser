<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝕄𝕔ℂ𝕣𝕒𝕔𝕜 Browser</title>
  <style>
    :root {
      --bg-1: #020202;
      --bg-2: #08090d;
      --panel: rgba(10, 10, 12, 0.96);
      --panel-2: rgba(18, 18, 22, 0.98);
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --text: #f5f7fb;
      --muted: #98a0ad;
      --accent: #8ab4f8;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(138, 180, 248, 0.08), transparent 24%), linear-gradient(180deg, #050506, #010101 55%, #000 100%);
    }

    body {
      display: flex;
    }

    .browser {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      background: linear-gradient(180deg, rgba(10, 10, 12, 0.98), rgba(0, 0, 0, 0.98));
    }

    .tabs-strip {
      display: flex;
      align-items: stretch;
      gap: 8px;
      padding: 10px 12px 0;
      overflow-x: auto;
      background: rgba(0, 0, 0, 0.4);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      scrollbar-width: thin;
    }

    .tab {
      min-width: 180px;
      max-width: 230px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      padding: 11px 12px 10px;
      background: linear-gradient(180deg, rgba(45,45,52,0.58), rgba(23,23,28,0.95));
      color: var(--muted);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .tab.active {
      background: linear-gradient(180deg, rgba(62,62,70,0.95), rgba(26,26,31,0.98));
      border-color: var(--line);
      color: var(--text);
    }

    .tab-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.95rem;
    }

    .tab-close {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .tab-close:hover,
    .icon-btn:hover,
    .go-btn:hover,
    .hero-search button:hover {
      background: rgba(255,255,255,0.09);
    }

    button, input {
      font: inherit;
    }

    .toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: linear-gradient(180deg, rgba(17,17,20,0.98), rgba(10,10,12,0.98));
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn,
    .go-btn,
    .hero-search button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-radius: 999px;
      height: 42px;
      min-width: 42px;
      padding: 0 14px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .icon-btn:hover,
    .go-btn:hover,
    .hero-search button:hover {
      transform: translateY(-1px);
    }

    .address-shell,
    .hero-search {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .address-shell {
      min-width: 0;
    }

    .address-shell input,
    .hero-search input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      outline: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      height: 46px;
      padding: 0 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .viewport {
      position: relative;
      min-height: 0;
      background: #050505;
    }

    .tab-panel {
      position: absolute;
      inset: 0;
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .new-tab-view {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(138, 180, 248, 0.14), transparent 24%),
        radial-gradient(circle at bottom, rgba(255,255,255,0.05), transparent 20%),
        linear-gradient(180deg, #0c0c10 0%, #050507 48%, #000000 100%);
    }

    .hero {
      width: min(680px, 100%);
      text-align: center;
      display: grid;
      gap: 26px;
      justify-items: center;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 18px 40px rgba(0,0,0,0.45);
    }

    .hero-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .hero-search {
      width: min(560px, 100%);
    }

    @media (max-width: 720px) {
      .toolbar {
        grid-template-columns: auto 1fr;
      }

      .toolbar .toolbar-group:last-child {
        grid-column: 1 / -1;
        justify-content: flex-end;
      }

      .tab {
        min-width: 140px;
      }
    }
  </style>
</head>
<body>
  <main class="browser">
    <section class="tabs-strip" id="tabs"></section>

    <section class="toolbar">
      <div class="toolbar-group">
        <button class="icon-btn" onclick="back()" aria-label="Back">←</button>
        <button class="icon-btn" onclick="forward()" aria-label="Forward">→</button>
        <button class="icon-btn" onclick="reloadFrame()" aria-label="Reload">↻</button>
      </div>

      <div class="address-shell">
        <input id="urlBar" type="text" placeholder="Search Google or type a URL" autocomplete="off" />
        <button class="go-btn" onclick="go()">Go</button>
      </div>

      <div class="toolbar-group">
        <button class="icon-btn" onclick="newTab()" aria-label="New tab">＋</button>
      </div>
    </section>

    <section class="viewport" id="viewport"></section>
  </main>

  <script>
    const proxy = "https://openbare-edge.patrickmango499.workers.dev/";

    const tabs = [];
    let activeTab = 0;

    function getTabTitle(tab, index) {
      if (tab.isNewTab) return `New Tab ${index + 1}`;
      try {
        return new URL(tab.url).hostname.replace(/^www\./, "") || `Tab ${index + 1}`;
      } catch {
        return `Tab ${index + 1}`;
      }
    }

    function normalizeInput(value) {
      let url = value.trim();
      if (!url) return "";

      if (!/^https?:\/\//i.test(url) && !url.startsWith("proxy://")) {
        if (!url.includes(".") || /\s/.test(url)) {
          url = `https://www.google.com/search?q=${encodeURIComponent(url)}`;
        } else {
          url = `https://${url}`;
        }
      }

      return url;
    }

    function createNewTabPanel(tab, index) {
      const panel = document.createElement("section");
      panel.className = "tab-panel";
      panel.dataset.index = index;
      panel.innerHTML = `
        <div class="new-tab-view">
          <div class="hero">
            <div>
              <h1 class="hero-title">𝕄𝕔ℂ𝕣𝕒𝕔𝕜</h1>
              <p class="hero-subtitle">Search the web or enter a URL to start browsing.</p>
            </div>
            <form class="hero-search">
              <input type="text" placeholder="Search Google or type a URL" aria-label="New tab search" />
              <button type="submit">Go</button>
            </form>
          </div>
        </div>
      `;

      const input = panel.querySelector("input");
      const form = panel.querySelector("form");
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        activeTab = Number(panel.dataset.index || 0);
        go(input.value);
      });
      tab.panel = panel;
      return panel;
    }

    function createIframePanel(tab, index) {
      const panel = document.createElement("section");
      panel.className = "tab-panel";
      panel.dataset.index = index;
      const frame = document.createElement("iframe");
      frame.title = `𝕄𝕔ℂ𝕣𝕒𝕔𝕜 Browser tab ${index + 1}`;
      panel.appendChild(frame);
      tab.frame = frame;
      tab.panel = panel;
      return panel;
    }

    function syncPanels() {
      const viewport = document.getElementById("viewport");
      viewport.innerHTML = "";
      tabs.forEach((tab, index) => {
        if (!tab.panel) {
          viewport.appendChild(tab.isNewTab ? createNewTabPanel(tab, index) : createIframePanel(tab, index));
        } else {
          tab.panel.dataset.index = index;
          if (tab.frame) tab.frame.title = `𝕄𝕔ℂ𝕣𝕒𝕔𝕜 Browser tab ${index + 1}`;
          viewport.appendChild(tab.panel);
        }
        tab.panel.classList.toggle("active", index === activeTab);
      });
    }

    function renderTabs() {
      const tabContainer = document.getElementById("tabs");
      tabContainer.innerHTML = "";

      tabs.forEach((tab, index) => {
        const button = document.createElement("button");
        button.className = `tab${index === activeTab ? " active" : ""}`;
        button.type = "button";
        button.innerHTML = `
          <span class="tab-label">${getTabTitle(tab, index)}</span>
          <span class="tab-close" aria-hidden="true">✕</span>
        `;

        button.addEventListener("click", () => {
          activeTab = index;
          render();
        });

        button.querySelector(".tab-close").addEventListener("click", (event) => {
          event.stopPropagation();
          closeTab(index);
        });

        tabContainer.appendChild(button);
      });
    }

    function updateUrlBar() {
      const current = tabs[activeTab];
      document.getElementById("urlBar").value = current?.isNewTab ? "" : current?.url || "";
    }

    function render() {
      renderTabs();
      syncPanels();
      updateUrlBar();
    }

    function newTab() {
      tabs.push({ isNewTab: true, url: "", panel: null, frame: null });
      activeTab = tabs.length - 1;
      render();
      const activeInput = tabs[activeTab].panel?.querySelector("input");
      if (activeInput) activeInput.focus();
    }

    function closeTab(index) {
      if (tabs.length <= 1) return;
      const [closed] = tabs.splice(index, 1);
      closed.panel?.remove();
      activeTab = Math.max(0, Math.min(activeTab > index ? activeTab - 1 : activeTab, tabs.length - 1));
      render();
    }

    function ensureFrame(tab, index) {
      if (!tab.frame) {
        tab.panel?.remove();
        tab.panel = null;
        const viewport = document.getElementById("viewport");
        const panel = createIframePanel(tab, index);
        viewport.appendChild(panel);
      }
      tab.panel.classList.toggle("active", index === activeTab);
      return tab.frame;
    }

    function go(urlOverride) {
      const tab = tabs[activeTab];
      if (!tab) return;
      const inputValue = typeof urlOverride === "string" ? urlOverride : document.getElementById("urlBar").value;
      const url = normalizeInput(inputValue);
      if (!url) return;

      tab.isNewTab = false;
      tab.url = url;
      const frame = ensureFrame(tab, activeTab);
      frame.src = proxy + encodeURIComponent(url);
      render();
    }

    function getActiveFrame() {
      return tabs[activeTab]?.frame || null;
    }

    function back() {
      const frame = getActiveFrame();
      if (frame) frame.contentWindow.history.back();
    }

    function forward() {
      const frame = getActiveFrame();
      if (frame) frame.contentWindow.history.forward();
    }

    function reloadFrame() {
      const frame = getActiveFrame();
      if (frame) frame.contentWindow.location.reload();
    }

    document.getElementById("urlBar").addEventListener("keydown", (event) => {
      if (event.key === "Enter") go();
    });

    newTab();
  </script>
</body>
</html>
